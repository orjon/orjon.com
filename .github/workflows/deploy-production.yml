name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/orjon.com/production
            echo "Pulling latest changes..."
            git pull origin main
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            echo "Checking required Node.js version..."
            nvm use || nvm install
            echo "Using Node.js version: $(node -v)"
            npm ci
            echo "Running tests..."
            npm run test
            echo "Removing .next directory..."
            rm -rf .next
            export NEXT_PUBLIC_ENV="production"
            export NEXT_PUBLIC_BUILD_VERSION="$(date +%s)"
            echo "Environment: $NEXT_PUBLIC_ENV"
            echo "Build version: $NEXT_PUBLIC_BUILD_VERSION"
            echo "Starting build..."
            npm run build || { echo "Build failed! Aborting deployment."; exit 1; }
            echo "Build succeeded. Reloading..."
            pm2 reload orjon-production --update-env
            echo "Waiting for server to be ready..."
            for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q 200 && break; sleep 2; done
            echo "Starting image cache warming in background..."
            cd /var/www/orjon.com/production && IMAGE_WARM_ORIGIN=http://localhost:3000 nohup npm run warm-images > /tmp/warm-images.log 2>&1 &
