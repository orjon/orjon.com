name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/orjon.com/production
            echo "Pulling latest changes..."
            git pull origin main
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            echo "Checking required Node.js version..."
            nvm use || nvm install
            echo "Using Node.js version: $(node -v)"
            npm ci
            echo "Running tests..."
            npm run test
            echo "Removing .next directory..."
            pkill -f "processImages" || true
            rm -rf .next
            set -a && . ./.env.production 2>/dev/null || true && set +a
            echo "Environment: $NEXT_PUBLIC_ENV"
            echo "Starting build..."
            npm run build || { echo "Build failed! Aborting deployment."; exit 1; }
            echo "Build succeeded. Reloading..."
            pm2 reload orjon-production --update-env
            echo "Waiting for server to be ready..."
            for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" ${ORIGIN} | grep -q 200 && break; sleep 2; done
            echo "Starting image cache warming in background..."
            nohup npm run warm-images > /tmp/warm-images.log 2>&1 &
            disown
