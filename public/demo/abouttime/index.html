<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script type="text/javascript" src="./scripts/jsRapKnob.js"></script>
    <script type="text/javascript" src="./scripts/main.js"></script>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="abouttime" style="opacity: 0">
      <div class="preloader">
        <img src="./images/D1-0.png" />
        <img src="./images/D1-1.png" />
        <img src="./images/D1-2.png" />

        <img src="./images/D2-0.png" />
        <img src="./images/D2-1.png" />
        <img src="./images/D2-2.png" />
        <img src="./images/D2-3.png" />
        <img src="./images/D2-4.png" />
        <img src="./images/D2-5.png" />
        <img src="./images/D2-6.png" />
        <img src="./images/D2-7.png" />
        <img src="./images/D2-8.png" />
        <img src="./images/D2-9.png" />

        <img src="./images/D3-0.png" />
        <img src="./images/D3-1.png" />
        <img src="./images/D3-2.png" />
        <img src="./images/D3-3.png" />
        <img src="./images/D3-4.png" />
        <img src="./images/D3-5.png" />

        <img src="./images/D4-0.png" />
        <img src="./images/D4-1.png" />
        <img src="./images/D4-2.png" />
        <img src="./images/D4-3.png" />
        <img src="./images/D4-4.png" />
        <img src="./images/D4-5.png" />
        <img src="./images/D4-6.png" />
        <img src="./images/D4-7.png" />
        <img src="./images/D4-8.png" />
        <img src="./images/D4-9.png" />
      </div>
      <div class="clock">
        <img class="background" src="./images/abouttimebackground.png" />
        <img id="D1" class="digit" src="./images/D1-0.png" />
        <img id="D2" class="digit" src="./images/D2-0.png" />
        <img class="secondBlinker" src="./images/secondblinker.png" />
        <img id="D3" class="digit" src="./images/D3-0.png" />
        <img id="D4" class="digit" src="./images/D4-0.png" />
        <img class="overlay" src="./images/abouttimeOverlay.png" />
        <img class="overlay" src="./images/abouttimeOverlay.png" />
      </div>
      <div class="controls">
        <div class="knobs">
          <div id="varianceKnob" class="knob"></div>
          <div id="frequencyKnob" class="knob"></div>
        </div>
      </div>
    </div>
  </body>
</html>
